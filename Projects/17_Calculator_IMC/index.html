<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator IMC</title>
      <link rel="stylesheet" href="css/styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <script src="js/scripts.js" defer></script>
</head>
<body>
    <div class="container">
        <div id="calc-container">
            <h2>Calculator IMC</h2>
            <form id="imc-form">
                <div class="form-inputs">
                    <div class="form-control">
                        <label for="height">Height:</label>
                        <input 
                        type="text"
                        name="height"
                        id="height"
                        placeholder="Example 1,75"/>
                    </div>
                    <div class="form-control">
                         <label for="weight">Weight:</label>
                        <input 
                        type="text"
                        name="weight"
                        id="weight"
                        placeholder="Example 70,5"/>
                    </div>
                </div>
                <div class="action-control">
                    <button id="calc-btn">Calculate</button>
                    <button id="clear-btn">Clear</button>
                </div>
            </form>
        </div>
        <div id="result-container" class="hide">
            <p id="imc-number">Your IMC: <span></span></p>
            <p id="imc-info">Current Situation</p>
            <h3>Check out the rankings:</h3>
            <div id="imc-table">
                <div class="table-header">
                    <h4>IMC</h4>
                    <h4>Rankings</h4>
                    <h4>Obesity</h4>
                </div>
                <button id="back-btn">Return</button>
            </div>
        </div>
    </div>
</body>
</html>
